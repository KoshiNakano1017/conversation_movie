{% extends "base.html" %}

{% block title %}ダッシュボード | ConversationMovie{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">

  <!-- ページヘッダー -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">ダッシュボード</h1>
      <p class="text-slate-500 text-sm mt-1">処理済み・処理中の動画一覧</p>
    </div>
    <a
      href="/paste"
      class="gradient-bg text-white font-semibold px-5 py-2.5 rounded-xl
             hover:opacity-90 active:scale-95 transition-all duration-150 text-sm"
    >
      + 新しい動画を作成
    </a>
  </div>

  <!-- ステータスフィルター -->
  <div class="flex gap-2 mb-5 flex-wrap">
    <button onclick="filterJobs('')" id="filter-all"
      class="filter-btn active px-4 py-1.5 rounded-full text-sm font-medium border transition-all
             bg-indigo-600 text-white border-indigo-600">
      すべて
    </button>
    <button onclick="filterJobs('completed')" id="filter-completed"
      class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border transition-all
             bg-white text-slate-600 border-slate-200 hover:border-indigo-300">
      完了
    </button>
    <button onclick="filterJobs('analyzing')" id="filter-analyzing"
      class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border transition-all
             bg-white text-slate-600 border-slate-200 hover:border-indigo-300">
      処理中
    </button>
    <button onclick="filterJobs('failed')" id="filter-failed"
      class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border transition-all
             bg-white text-slate-600 border-slate-200 hover:border-indigo-300">
      失敗
    </button>
  </div>

  <!-- ジョブ一覧 -->
  <div id="jobList" class="space-y-3">
    <!-- ローディング状態 -->
    <div id="loadingState" class="card p-8 text-center text-slate-400">
      <div class="animate-spin text-3xl mb-3">⟳</div>
      <p class="text-sm">読み込み中...</p>
    </div>
    <!-- 空状態（JSで表示） -->
    <div id="emptyState" class="card p-10 text-center hidden">
      <div class="text-5xl mb-4">🎬</div>
      <p class="text-slate-600 font-medium mb-1">まだ動画がありません</p>
      <p class="text-slate-400 text-sm mb-4">会議録・ニュース・スレッドなどを貼り付けて最初の動画を作成しましょう</p>
      <a href="/paste" class="gradient-bg text-white text-sm font-medium px-5 py-2 rounded-xl inline-block hover:opacity-90 transition">
        今すぐ作成する
      </a>
    </div>
  </div>

  <!-- ページネーション -->
  <div id="pagination" class="flex items-center justify-center gap-2 mt-6 hidden">
    <button id="prevBtn" onclick="changePage(-1)"
      class="px-4 py-2 rounded-lg border border-slate-200 text-sm text-slate-600
             hover:border-indigo-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
      ← 前へ
    </button>
    <span id="pageInfo" class="text-sm text-slate-500 px-3"></span>
    <button id="nextBtn" onclick="changePage(1)"
      class="px-4 py-2 rounded-lg border border-slate-200 text-sm text-slate-600
             hover:border-indigo-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
      次へ →
    </button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  // ─── 状態管理 ────────────────────────────────────────────────────
  let currentPage = 1;
  let currentFilter = '';
  const PAGE_SIZE = 10;

  // ステータスの日本語表示マップ
  const STATUS_LABELS = {
    pending:              { label: '待機中',         color: 'bg-slate-100 text-slate-600' },
    uploading:            { label: 'アップロード中',  color: 'bg-blue-100 text-blue-700' },
    transcribing:         { label: '文字起こし中',   color: 'bg-blue-100 text-blue-700' },
    diarizing:            { label: '話者分離中',      color: 'bg-cyan-100 text-cyan-700' },
    analyzing:            { label: 'AI分析中',        color: 'bg-purple-100 text-purple-700' },
    generating_subtitles: { label: '字幕生成中',      color: 'bg-violet-100 text-violet-700' },
    generating_video:     { label: '動画生成中',      color: 'bg-pink-100 text-pink-700' },
    generating_shorts:    { label: 'Shorts生成中',    color: 'bg-orange-100 text-orange-700' },
    uploading_youtube:    { label: 'YouTube投稿中',   color: 'bg-red-100 text-red-700' },
    completed:            { label: '完了',             color: 'bg-green-100 text-green-700' },
    failed:               { label: '失敗',             color: 'bg-red-100 text-red-600' },
    cancelled:            { label: 'キャンセル',       color: 'bg-slate-100 text-slate-500' },
  };

  // ─── APIコール ───────────────────────────────────────────────────
  async function loadJobs() {
    const list = document.getElementById('jobList');
    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('emptyState').classList.add('hidden');

    try {
      const params = new URLSearchParams({ page: currentPage, page_size: PAGE_SIZE });
      if (currentFilter) params.set('status', currentFilter);

      const token = localStorage.getItem('access_token');
      const res = await fetch(`/api/jobs?${params}`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
      });
      if (!res.ok) throw new Error('取得失敗');

      const data = await res.json();
      renderJobs(data);
    } catch (err) {
      list.innerHTML = `<div class="card p-8 text-center text-red-400 text-sm">読み込みに失敗しました: ${err.message}</div>`;
    } finally {
      document.getElementById('loadingState').classList.add('hidden');
    }
  }

  function renderJobs(data) {
    const list = document.getElementById('jobList');

    // ローディングとローカルステートを除外
    const cards = list.querySelectorAll('.job-card');
    cards.forEach(c => c.remove());

    if (!data.jobs || data.jobs.length === 0) {
      document.getElementById('emptyState').classList.remove('hidden');
      document.getElementById('pagination').classList.add('hidden');
      return;
    }

    document.getElementById('emptyState').classList.add('hidden');

    // カード生成
    const fragment = document.createDocumentFragment();
    data.jobs.forEach(job => {
      const card = createJobCard(job);
      fragment.appendChild(card);
    });
    list.appendChild(fragment);

    // ページネーション
    const totalPages = Math.ceil(data.total / PAGE_SIZE);
    if (totalPages > 1) {
      document.getElementById('pagination').classList.remove('hidden');
      document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages} ページ`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    } else {
      document.getElementById('pagination').classList.add('hidden');
    }
  }

  function createJobCard(job) {
    const statusInfo = STATUS_LABELS[job.status] || { label: job.status, color: 'bg-slate-100 text-slate-600' };
    const date = new Date(job.created_at).toLocaleString('ja-JP', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit',
    });

    const div = document.createElement('div');
    div.className = 'job-card card p-5 flex items-center gap-4 hover:shadow-md transition-shadow cursor-pointer';
    div.onclick = () => window.location.href = `/jobs/${job.id}`;

    div.innerHTML = `
      <!-- ステータスインジケーター -->
      <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-xl
                  ${job.status === 'completed' ? 'bg-green-50' : job.status === 'failed' ? 'bg-red-50' : 'bg-indigo-50'}">
        ${job.status === 'completed' ? '✅' : job.status === 'failed' ? '❌' : '⏳'}
      </div>

      <!-- メイン情報 -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <h3 class="font-semibold text-slate-800 truncate">${escapeHtml(job.title)}</h3>
          <span class="flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${statusInfo.color}">
            ${statusInfo.label}
          </span>
        </div>
        <div class="flex items-center gap-4 text-xs text-slate-400">
          <span>${date}</span>
          ${job.status !== 'completed' && job.status !== 'failed' && job.status !== 'cancelled'
            ? `<div class="flex items-center gap-1.5">
                <div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-indigo-400 rounded-full transition-all" style="width:${job.progress || 0}%"></div>
                </div>
                <span>${job.progress || 0}%</span>
               </div>`
            : ''}
        </div>
      </div>

      <!-- アクションリンク -->
      <div class="flex-shrink-0 flex items-center gap-2">
        ${job.has_video
          ? `<a href="/jobs/${job.id}/preview" onclick="event.stopPropagation()"
               class="text-xs text-indigo-600 hover:underline font-medium">
               プレビュー
             </a>`
          : ''}
        <span class="text-slate-300">›</span>
      </div>
    `;

    return div;
  }

  // ─── フィルター・ページネーション ─────────────────────────────
  function filterJobs(status) {
    currentFilter = status;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
      btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
    });
    const active = document.getElementById(`filter-${status || 'all'}`);
    if (active) {
      active.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
      active.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
    }
    // 既存カードをクリア
    document.querySelectorAll('.job-card').forEach(c => c.remove());
    loadJobs();
  }

  function changePage(delta) {
    currentPage += delta;
    document.querySelectorAll('.job-card').forEach(c => c.remove());
    loadJobs();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ─── 初期ロード ──────────────────────────────────────────────────
  loadJobs();

  // 処理中のジョブがある場合は5秒ごとに自動更新
  setInterval(() => {
    const processing = document.querySelectorAll('.job-card');
    const hasActive = Array.from(processing).some(card =>
      card.querySelector('[class*="indigo"]') && !card.querySelector('.text-green-700')
    );
    if (hasActive) loadJobs();
  }, 5000);
</script>
{% endblock %}
