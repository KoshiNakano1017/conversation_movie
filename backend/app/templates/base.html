<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ConversationMovie{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- ナビゲーションバー -->
  <nav class="gradient-bg shadow-lg">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-white font-bold text-xl tracking-tight flex items-center gap-2">
        🎬 <span>ConversationMovie</span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/dashboard" class="text-indigo-100 hover:text-white text-sm transition">ダッシュボード</a>
        <a href="/paste" class="bg-white text-indigo-600 px-4 py-1.5 rounded-full text-sm font-medium hover:bg-indigo-50 transition">
          + 新規作成
        </a>
      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
